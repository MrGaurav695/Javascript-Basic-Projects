<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day #50 - Food Recipe App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>🍽 Recipe Finder</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search ingredient...">
        <button id="searchButton">Search</button>
    </div>
</header>

<main>
    <div id="mealList" class="meal-list"></div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay"></div>

<div class="modal" id="modal">
    <button class="close-btn" id="recipeCloseBtn">&times;</button>
    <div class="meal-details-content"></div>
</div>

<script src="script.js"></script>
</body>
</html>
